<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>China — Pylon IPO Terminal</title>
<link rel="stylesheet" href="shared.css">
</head>
<body>
<div class="topbar">
  <div class="topbar-row">
    <div>
      <div class="brand"><a href="index.html">PYLON <span>· IPO Terminal</span></a></div>
      <div class="brand-sub">Robotics &amp; Embodied AI — China (HKEX · STAR · Shenzhen)</div>
    </div>
    <div class="updated" id="updated"></div>
  </div>
  <div class="nav" id="nav"></div>
</div>
<div class="wrap">
  <div class="lede" id="lede"></div>
  <div class="legend" id="legend"></div>
  <div class="section-header">
    <div class="section-label">Chinese robotics IPOs <span class="section-sublabel" id="count-sub"></span></div>
    <div class="controls">
      <input type="text" id="search" placeholder="Search company / subsector…">
      <div class="seg" id="sub-seg">
        <button data-sub="all" class="on">All</button>
        <button data-sub="humanoid">Humanoid</button>
        <button data-sub="auto">Autonomous</button>
        <button data-sub="warehouse">Warehouse</button>
        <button data-sub="lidar">Lidar</button>
      </div>
    </div>
  </div>
  <div id="tbl"></div>
  <div class="disclaimer" id="disc"></div>
</div>
<div class="overlay" id="overlay"></div>
<aside class="panel" id="panel"></aside>
<script src="data.js"></script>
<script src="shared.js"></script>
<script>
var state={sub:"all",q:""};
function filtered(){var q=state.q.trim().toLowerCase();
  return COMPANIES.filter(function(c){
    if(c.mkt!=="CN")return false;
    if(state.sub!=="all"&&c.sub!==state.sub)return false;
    if(q&&(c.co+" "+(c.cn||"")+" "+SUB_LABEL[c.sub]+" "+c.ticker).toLowerCase().indexOf(q)<0)return false;
    return true;}).sort(byDateDesc);}
function render(){var d=filtered();document.getElementById("count-sub").textContent="— "+d.length+" shown";
  var c=document.getElementById("tbl");
  c.innerHTML=d.length?buildTable(d,["company","sub","status","listing","cap","perf","source"]):'<div class="empty">No matches.</div>';
  wireRows(c);}
(function(){initChrome("china.html");
  document.getElementById("lede").innerHTML="China's 2025–26 robotics listing wave has swept the Hong Kong and STAR markets — humanoids (Unitree, UBTech, EngineAI), autonomous-driving silicon and robotaxi (Horizon, Momenta, WeRide, Pony.ai), lidar (Hesai, RoboSense), warehouse robots (Geek+, Hai Robotics) and precision components. Click any name for the deep dive.";
  document.getElementById("disc").innerHTML="Compiled 11 Jul 2026 from HKEX / SSE STAR / Shenzhen filings and press. Indicative figures; \"n/d\" = not disclosed. Not investment advice.";
  render();
  Array.prototype.forEach.call(document.querySelectorAll("#sub-seg button"),function(b){
    b.addEventListener("click",function(){state.sub=b.getAttribute("data-sub");
      Array.prototype.forEach.call(document.querySelectorAll("#sub-seg button"),function(x){x.classList.toggle("on",x===b);});render();});});
  var s=document.getElementById("search");s.addEventListener("input",function(){state.q=s.value;render();});
})();
</script>
</body>
</html>
