<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>United States — Pylon IPO Terminal</title>
<link rel="stylesheet" href="shared.css">
</head>
<body>
<div class="topbar">
  <div class="topbar-row">
    <div>
      <div class="brand"><a href="index.html">PYLON <span>· IPO Terminal</span></a></div>
      <div class="brand-sub">Robotics &amp; Embodied AI — United States (Nasdaq · NYSE · private)</div>
    </div>
    <div class="updated" id="updated"></div>
  </div>
  <div class="nav" id="nav"></div>
</div>
<div class="wrap">
  <div class="lede" id="lede"></div>
  <div class="legend" id="legend"></div>
  <div class="section-header">
    <div class="section-label">US robotics IPOs &amp; IPO-watch <span class="section-sublabel" id="count-sub"></span></div>
    <div class="controls">
      <input type="text" id="search" placeholder="Search company / subsector…">
      <div class="seg" id="sub-seg">
        <button data-sub="all" class="on">All</button>
        <button data-sub="humanoid">Humanoid</button>
        <button data-sub="auto">Autonomous</button>
        <button data-sub="defense">Defense</button>
        <button data-sub="lidar">Lidar</button>
        <button data-sub="surgical">Surgical</button>
      </div>
    </div>
  </div>
  <div id="tbl"></div>
  <div class="disclaimer" id="disc"></div>
</div>
<div class="overlay" id="overlay"></div>
<aside class="panel" id="panel"></aside>
<script src="data.js"></script>
<script src="shared.js"></script>
<script>
var state={sub:"all",q:""};
function filtered(){var q=state.q.trim().toLowerCase();
  return COMPANIES.filter(function(c){
    if(c.mkt!=="US")return false;
    if(state.sub!=="all"&&c.sub!==state.sub)return false;
    if(q&&(c.co+" "+SUB_LABEL[c.sub]+" "+c.ticker).toLowerCase().indexOf(q)<0)return false;
    return true;}).sort(byDateDesc);}
function render(){var d=filtered();document.getElementById("count-sub").textContent="— "+d.length+" shown";
  var c=document.getElementById("tbl");
  c.innerHTML=d.length?buildTable(d,["company","sub","status","listing","cap","perf","source"]):'<div class="empty">No matches.</div>';
  wireRows(c);}
(function(){initChrome("us.html");
  document.getElementById("lede").innerHTML="The US robotics story splits into scaled public winners (Symbotic, Intuitive Surgical, AeroVironment), speculative small-caps (Serve, Richtech, the lidar names) and a wall of private IPO-watch giants — Figure, 1X, Apptronik and Physical Intelligence in humanoids/embodied AI; Anduril, Shield AI, Saronic and Skydio in defence. Agility Robotics is going public via SPAC. Click any name for the deep dive.";
  document.getElementById("disc").innerHTML="Compiled 11 Jul 2026 from SEC filings, company disclosures and press. Private valuations are last-round marks. Indicative figures; \"n/d\" = not disclosed. Not investment advice.";
  render();
  Array.prototype.forEach.call(document.querySelectorAll("#sub-seg button"),function(b){
    b.addEventListener("click",function(){state.sub=b.getAttribute("data-sub");
      Array.prototype.forEach.call(document.querySelectorAll("#sub-seg button"),function(x){x.classList.toggle("on",x===b);});render();});});
  var s=document.getElementById("search");s.addEventListener("input",function(){state.q=s.value;render();});
})();
</script>
</body>
</html>
