<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Price Performance — Pylon IPO Terminal</title>
<link rel="stylesheet" href="shared.css">
<style>
  .pf-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border-row);cursor:pointer}
  .pf-row:hover{background:var(--surface-hover)}
  .pf-name{flex:0 0 210px;font-size:var(--font-body)}
  .pf-name .n{font-weight:600;color:var(--text-primary)}
  .pf-name .t{color:var(--text-muted);font-size:var(--font-label)}
  .pf-bar{flex:1;position:relative;height:22px}
  .pf-zero{position:absolute;top:-4px;bottom:-4px;width:1px;background:var(--border-strong)}
  .pf-fill{position:absolute;top:3px;height:16px;border-radius:2px}
  .pf-val{flex:0 0 64px;text-align:right;font-weight:700;font-variant-numeric:tabular-nums;font-size:var(--font-body)}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-row">
    <div>
      <div class="brand"><a href="index.html">PYLON <span>· IPO Terminal</span></a></div>
      <div class="brand-sub">Robotics &amp; Embodied AI — price performance since IPO</div>
    </div>
    <div class="updated" id="updated"></div>
  </div>
  <div class="nav" id="nav"></div>
</div>
<div class="wrap">
  <div class="lede" id="lede"></div>
  <div class="section-header"><div class="section-label">Return since IPO — listed names <span class="section-sublabel" id="count-sub"></span></div></div>
  <div id="chart"></div>
  <div class="disclaimer" id="disc"></div>
</div>
<div class="overlay" id="overlay"></div>
<aside class="panel" id="panel"></aside>
<script src="data.js"></script>
<script src="shared.js"></script>
<script>
(function(){
  initChrome("performance.html");
  document.getElementById("lede").innerHTML="Two-point return from IPO/de-SPAC reference price to the latest available quote, for every listed name on the terminal. A reminder that reaching the public market is not the same as rewarding shareholders — the robotics cohort is sharply bifurcated. Click any bar for the deep dive.";
  document.getElementById("disc").innerHTML="Return = (current − IPO reference) / IPO reference. SPAC names use the $10 reference. Prices carry the as-of dates on each company page; indicative only. Not investment advice.";
  var listed=COMPANIES.filter(function(c){return c.status==='listed'&&perf(c)!=null;})
    .sort(function(a,b){return perf(b)-perf(a);});
  document.getElementById("count-sub").textContent="— "+listed.length+" shown";
  var maxAbs=0;listed.forEach(function(c){maxAbs=Math.max(maxAbs,Math.abs(perf(c)));});
  var zero=42; // percent position of zero line within bar area
  var html=listed.map(function(c){
    var p=perf(c),up=p>=0,col=up?'var(--clr-pos)':'var(--clr-neg)';
    var w=Math.abs(p)/maxAbs*(up?(100-zero):zero);
    var left=up?zero:(zero-w);
    return '<div class="pf-row" data-id="'+c.id+'">'+
      '<div class="pf-name"><span class="n">'+esc(c.co)+'</span><br><span class="t">'+esc(c.ticker)+'</span></div>'+
      '<div class="pf-bar"><div class="pf-zero" style="left:'+zero+'%"></div>'+
        '<div class="pf-fill" style="left:'+left+'%;width:'+w+'%;background:'+col+'"></div></div>'+
      '<div class="pf-val" style="color:'+col+'">'+(up?'+':'')+p.toFixed(0)+'%</div></div>';
  }).join("");
  var el=document.getElementById("chart");el.innerHTML=html;
  Array.prototype.forEach.call(el.querySelectorAll(".pf-row"),function(r){
    r.addEventListener("click",function(){openPanel(r.getAttribute("data-id"));});});
})();
</script>
</body>
</html>
